<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7A9AA2"/>
      <stop offset="1" stop-color="#3E5459"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0F4F5" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#F0F4F5" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 배경 사각형 (iOS · Android · Windows 어댑티브 아이콘 안전 영역) -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>

  <!-- 메인: 큰 '영풀' 글자 -->
  <text x="256" y="320" font-family="'Noto Sans KR','Pretendard',sans-serif"
        font-size="210" font-weight="800" text-anchor="middle"
        fill="#F0F4F5" letter-spacing="-6">영풀</text>

  <!-- 하단 브랜드 바 -->
  <rect x="112" y="378" width="288" height="4" rx="2" fill="#D4E0E3" fill-opacity="0.45"/>

  <!-- 태그라인 텍스트 -->
  <text x="256" y="438" font-family="'Noto Sans KR','Pretendard',sans-serif"
        font-size="46" font-weight="500" text-anchor="middle"
        fill="#F0F4F5" fill-opacity="0.94" letter-spacing="1">막힌 영어를 풀다</text>
</svg>
