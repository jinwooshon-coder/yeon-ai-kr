<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>영풀 초3 — 단어와 짧은 문장</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --color-bg:#F0F4F5;
  --color-surface:#D4E0E3;
  --color-primary:#5A7A82;
  --color-muted:#A8B5B8;
  --color-text:#2C3E42;
  --color-text-light:#6B8A90;
  --color-success:#6B8F71;
  --color-error:#8F6B6B;
  --touch-min:60px;
  --card-radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Noto Sans KR','Pretendard',sans-serif;
  background:var(--color-bg);color:var(--color-text);
  font-size:18px;line-height:1.55;
  -webkit-tap-highlight-color:transparent;
  user-select:none;overflow-x:hidden;
}
.wrap{max-width:480px;margin:0 auto;padding:18px 16px 90px;}
@media(min-width:768px){.wrap{max-width:720px;padding:28px 24px 100px;}}

.app-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 4px 18px;position:sticky;top:0;background:var(--color-bg);z-index:50;}
.back{background:var(--color-surface);border:none;width:48px;height:48px;border-radius:14px;font-size:22px;cursor:pointer;color:var(--color-primary);}
.back:active{transform:scale(0.94);}
.title{flex:1;text-align:center;font-size:17px;font-weight:700;}
.title small{display:block;font-size:11px;color:var(--color-text-light);font-weight:400;margin-top:2px;}
.stickers{display:flex;align-items:center;gap:4px;background:var(--color-surface);padding:6px 10px;border-radius:20px;font-size:13px;font-weight:700;color:var(--color-primary);}

.progress{background:var(--color-surface);height:10px;border-radius:10px;overflow:hidden;margin-bottom:20px;}
.progress .bar{background:var(--color-primary);height:100%;width:0;transition:width .4s ease;}

.section-title{font-size:14px;font-weight:700;color:var(--color-text-light);margin:20px 4px 12px;display:flex;align-items:center;gap:8px;}
.section-title .num{background:var(--color-primary);color:#fff;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;}

/* 단어 카드 (가로 스크롤) */
.word-row{display:flex;gap:12px;overflow-x:auto;padding:4px 2px 12px;scroll-snap-type:x mandatory;}
.word-row::-webkit-scrollbar{height:4px;}
.word-row::-webkit-scrollbar-thumb{background:var(--color-muted);border-radius:4px;}
.word-mini{
  min-width:120px;flex-shrink:0;
  background:#fff;border-radius:14px;
  padding:14px 10px;text-align:center;
  box-shadow:0 2px 8px rgba(90,122,130,0.08);
  cursor:pointer;scroll-snap-align:start;
  border:2px solid transparent;
  transition:all .15s ease;
}
.word-mini:active{transform:scale(0.95);border-color:var(--color-primary);}
.word-mini .emo{font-size:40px;}
.word-mini .en{font-size:18px;font-weight:800;color:var(--color-primary);margin-top:4px;}
.word-mini .ko{font-size:12px;color:var(--color-text-light);}

/* 문장 카드 */
.sent-card{
  background:#fff;border-radius:var(--card-radius);
  padding:22px 18px;margin-bottom:14px;
  box-shadow:0 3px 12px rgba(90,122,130,0.1);
}
.sent-card .tag{display:inline-block;background:var(--color-surface);color:var(--color-primary);font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px;margin-bottom:10px;}
.sent-card .en{font-size:22px;font-weight:800;color:var(--color-primary);letter-spacing:-0.4px;line-height:1.4;}
.sent-card .en .hl{background:rgba(90,122,130,0.18);padding:0 4px;border-radius:4px;cursor:pointer;}
.sent-card .en .hl:active{background:rgba(90,122,130,0.35);}
.sent-card .ko{font-size:14px;color:var(--color-text-light);margin-top:6px;}
.sent-card .tools{display:flex;gap:8px;margin-top:14px;}
.mini-btn{
  background:var(--color-surface);color:var(--color-primary);
  border:none;border-radius:12px;
  padding:10px 14px;font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;
  display:flex;align-items:center;gap:6px;min-height:44px;
}
.mini-btn:active{transform:scale(0.94);}
.mini-btn.playing{background:var(--color-primary);color:#fff;}

/* 빈칸 채우기 */
.fill-card{
  background:#fff;border-radius:var(--card-radius);
  padding:24px 20px;margin-bottom:20px;
  box-shadow:0 3px 12px rgba(90,122,130,0.1);
  text-align:center;
}
.fill-card .lbl{font-size:13px;color:var(--color-text-light);margin-bottom:12px;}
.fill-card .sentence{font-size:24px;font-weight:800;color:var(--color-primary);margin-bottom:6px;line-height:1.5;}
.fill-card .blank{display:inline-block;min-width:80px;padding:2px 14px;background:var(--color-surface);border-bottom:3px solid var(--color-primary);border-radius:6px 6px 0 0;margin:0 4px;}
.fill-card .blank.filled{background:#C4E0C8;color:var(--color-success);}
.fill-card .blank.wrong{background:#E0C4C4;color:var(--color-error);animation:shake .4s;}
.fill-card .ko{font-size:14px;color:var(--color-text-light);margin:8px 0 18px;}
.fill-opts{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.opt-btn{
  background:var(--color-surface);color:var(--color-primary);
  border:2px solid transparent;
  border-radius:12px;
  padding:16px 8px;
  font-size:18px;font-weight:700;
  cursor:pointer;font-family:inherit;
  min-height:var(--touch-min);
  transition:all .2s ease;
}
.opt-btn:active{transform:scale(0.95);}
.opt-btn.correct{background:#C4E0C8;border-color:var(--color-success);}

/* 단어 호버 팁 (뜻 표시 + 클릭 소리) */
.word-tip{position:relative;}
.word-tip:not(.locked)::after{
  content:attr(data-tip);
  position:absolute;
  bottom:calc(100% + 8px);
  left:50%;
  transform:translateX(-50%) scale(0);
  background:var(--color-text);
  color:#fff;
  padding:8px 14px;
  border-radius:10px;
  font-size:14px;
  font-weight:500;
  white-space:nowrap;
  pointer-events:none;
  box-shadow:0 4px 14px rgba(0,0,0,0.25);
  transition:transform .15s ease;
  transform-origin:bottom center;
  z-index:20;
}
.word-tip:not(.locked):hover::after{transform:translateX(-50%) scale(1);}
.word-tip:not(.locked)::before{
  content:'';
  position:absolute;
  bottom:calc(100% + 2px);
  left:50%;
  transform:translateX(-50%) scale(0);
  border:6px solid transparent;
  border-top-color:var(--color-text);
  pointer-events:none;
  transition:transform .15s ease;
  z-index:20;
}
.word-tip:not(.locked):hover::before{transform:translateX(-50%) scale(1);}
.word-tip.unlocked-hint{animation:hintPulse 1.2s ease 2;}
@keyframes hintPulse{0%,100%{box-shadow:0 0 0 0 rgba(143,107,107,0);}50%{box-shadow:0 0 0 5px rgba(143,107,107,0.25);}}
.opt-btn.wrong{background:#E0C4C4;border-color:var(--color-error);}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}

/* 스티커 팝업 */
.sticker-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:200;}
.sticker-overlay.show{display:flex;}
.sticker-pop{background:#fff;border-radius:24px;padding:30px 26px;text-align:center;max-width:300px;animation:popIn .45s ease;}
@keyframes popIn{0%{transform:scale(0.3) rotate(-8deg);opacity:0;}60%{transform:scale(1.1) rotate(4deg);}100%{transform:scale(1) rotate(0);opacity:1;}}
.sticker-pop .big{font-size:80px;margin-bottom:6px;}
.sticker-pop h3{font-size:20px;color:var(--color-primary);margin-bottom:4px;}
.sticker-pop p{font-size:13px;color:var(--color-text-light);margin-bottom:16px;}
.sticker-pop button{background:var(--color-primary);color:#fff;border:none;border-radius:12px;padding:13px 22px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;}

.done-banner{
  background:linear-gradient(145deg,#C4E0C8 0%,var(--color-surface) 100%);
  border-radius:var(--card-radius);padding:22px;text-align:center;margin-top:20px;display:none;
}
.done-banner.show{display:block;}
.done-banner .big{font-size:48px;margin-bottom:6px;}
.done-banner h3{font-size:18px;color:var(--color-primary);margin-bottom:4px;}
.done-banner p{font-size:13px;color:var(--color-text-light);}

.foot-nav{position:fixed;bottom:0;left:0;right:0;background:var(--color-bg);padding:12px 16px 18px;border-top:1px solid var(--color-surface);display:flex;gap:10px;max-width:720px;margin:0 auto;}
.foot-btn{flex:1;padding:16px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;min-height:var(--touch-min);}
.foot-btn.primary{background:var(--color-primary);color:#fff;}
.foot-btn.ghost{background:var(--color-surface);color:var(--color-primary);}
.foot-btn:active{transform:scale(0.96);}
</style>
</head>
<body>
<div class="wrap">

  <div class="app-bar">
    <button class="back" onclick="location.href='index.html'" aria-label="돌아가기">←</button>
    <div class="title">초등 3학년<small>단어와 짧은 문장</small></div>
    <div class="stickers">⭐ <span id="stickerCount">0</span></div>
  </div>

  <div class="progress"><div class="bar" id="progressBar"></div></div>

  <!-- 1. 단어 훑어보기 -->
  <div class="section-title"><span class="num">1</span> 오늘의 단어</div>
  <div class="word-row" id="wordRow"></div>

  <!-- 2. 문장 듣기 -->
  <div class="section-title"><span class="num">2</span> 문장을 듣고 따라 말해요</div>
  <div id="sentList"></div>

  <!-- 3. 빈칸 채우기 -->
  <div class="section-title"><span class="num">3</span> 빈칸에 맞는 단어를 골라요</div>
  <div class="fill-card" id="fillCard">
    <div class="lbl">문장을 완성해 보세요</div>
    <div class="sentence" id="fillSentence"></div>
    <div class="ko" id="fillKo"></div>
    <div class="fill-opts" id="fillOpts"></div>
  </div>

  <div class="done-banner" id="doneBanner">
    <div class="big">🎉</div>
    <h3>오늘 수업 완료!</h3>
    <p>스티커 <span id="doneCount">0</span>개 획득. 내일도 만나요!</p>
  </div>

</div>

<div class="foot-nav">
  <button class="foot-btn ghost" onclick="resetLesson()">🔄 처음부터</button>
  <button class="foot-btn primary" onclick="nextFill()">다음 문제 →</button>
</div>

<div class="sticker-overlay" id="stickerOverlay">
  <div class="sticker-pop">
    <div class="big" id="popEmoji">⭐</div>
    <h3 id="popTitle">잘했어요!</h3>
    <p id="popSub">스티커 1개 획득</p>
    <button onclick="closePop()">계속하기</button>
  </div>
</div>

<script>
// ========== 데이터 ==========
const WORDS = [
  {en:'happy',  ko:'기쁜',    emoji:'😊'},
  {en:'sad',    ko:'슬픈',    emoji:'😢'},
  {en:'book',   ko:'책',      emoji:'📘'},
  {en:'friend', ko:'친구',    emoji:'👫'},
  {en:'mom',    ko:'엄마',    emoji:'👩'},
  {en:'dad',    ko:'아빠',    emoji:'👨'},
  {en:'apple',  ko:'사과',    emoji:'🍎'},
  {en:'water',  ko:'물',      emoji:'💧'}
];

// 짧은 문장: I am ~, I have ~, I like ~ 패턴
const SENTENCES = [
  {en:'I am <span class="hl">happy</span>.',        ko:'나는 기뻐요.',        speak:'I am happy.'},
  {en:'I am <span class="hl">sad</span>.',          ko:'나는 슬퍼요.',        speak:'I am sad.'},
  {en:'I have a <span class="hl">book</span>.',     ko:'나는 책이 있어요.',   speak:'I have a book.'},
  {en:'I like my <span class="hl">friend</span>.',  ko:'나는 친구를 좋아해요.', speak:'I like my friend.'},
  {en:'I love <span class="hl">mom</span>.',        ko:'나는 엄마를 사랑해요.', speak:'I love mom.'},
  {en:'I want <span class="hl">water</span>.',      ko:'나는 물을 원해요.',    speak:'I want water.'}
];

// 빈칸 채우기
const FILLS = [
  {tmpl:['I am ', ''], ans:'happy', ko:'나는 기뻐요.',      opts:['happy','dog','book','run']},
  {tmpl:['I have a ', ''], ans:'book', ko:'나는 책이 있어요.', opts:['book','sad','swim','sky']},
  {tmpl:['I love ', ''], ans:'mom', ko:'나는 엄마를 사랑해요.', opts:['mom','car','tree','run']},
  {tmpl:['I want ', ''], ans:'water', ko:'나는 물을 원해요.',  opts:['water','bed','fly','red']},
  {tmpl:['I like my ', ''], ans:'friend', ko:'나는 친구를 좋아해요.', opts:['friend','sky','eat','blue']}
];

// 단어 뜻 사전 (호버 팁·클릭 소리용)
const WORD_DICT = {
  happy:'기쁜', sad:'슬픈', book:'책', friend:'친구', mom:'엄마', dad:'아빠',
  apple:'사과', water:'물', dog:'강아지', cat:'고양이', run:'달리다', swim:'수영하다',
  sky:'하늘', car:'자동차', tree:'나무', bed:'침대', fly:'날다', red:'빨간', eat:'먹다', blue:'파란'
};

// ========== 상태 ==========
const STATE_KEY = 'yeon_low_g3_state';
let state = loadState();
function loadState(){
  try { return JSON.parse(localStorage.getItem(STATE_KEY)) || { stickers:0, doneWords:[], doneSents:[], fillIdx:0 }; }
  catch { return { stickers:0, doneWords:[], doneSents:[], fillIdx:0 }; }
}
function saveState(){ localStorage.setItem(STATE_KEY, JSON.stringify(state)); }

// ========== TTS ==========
function speak(text, btn){
  if (!('speechSynthesis' in window)) return;
  try { window.speechSynthesis.cancel(); } catch {}
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.85; u.pitch = 1.05;
  if (btn) btn.classList.add('playing');
  u.onend = () => { if (btn) btn.classList.remove('playing'); };
  u.onerror = () => { if (btn) btn.classList.remove('playing'); };
  window.speechSynthesis.speak(u);
}

// ========== 단어 ==========
function renderWords(){
  const row = document.getElementById('wordRow');
  row.innerHTML = WORDS.map((w,i) =>
    '<div class="word-mini" onclick="tapWord('+i+',this)">' +
      '<div class="emo">'+w.emoji+'</div>' +
      '<div class="en">'+w.en+'</div>' +
      '<div class="ko">'+w.ko+'</div>' +
    '</div>'
  ).join('');
}
function tapWord(i, el){
  const w = WORDS[i];
  speak(w.en);
  if (!state.doneWords.includes(w.en)){
    state.doneWords.push(w.en);
    addSticker();
    saveState();
    updateProgress();
  }
}

// ========== 문장 ==========
function renderSents(){
  const box = document.getElementById('sentList');
  box.innerHTML = SENTENCES.map((s,i) => {
    // .hl 단어에 호버 팁 + 클릭 소리 (퀴즈 밖이라 항상 열림)
    const enTipped = s.en.replace(/<span class="hl">(\w+)<\/span>/g, (m, w) => {
      const tip = (WORD_DICT[w] || WORD_DICT[w.toLowerCase()] || '').replace(/"/g,'&quot;');
      return '<span class="hl word-tip" data-tip="'+tip+'" onclick="speak(\''+w+'\')">'+w+'</span>';
    });
    return '<div class="sent-card">' +
      '<span class="tag">문장 '+(i+1)+'</span>' +
      '<div class="en">'+enTipped+'</div>' +
      '<div class="ko">'+s.ko+'</div>' +
      '<div class="tools">' +
        '<button class="mini-btn" onclick="speakSent('+i+',this)">🔊 듣기</button>' +
        '<button class="mini-btn" onclick="slowSent('+i+',this)">🐢 천천히</button>' +
      '</div>' +
    '</div>';
  }).join('');
}
function speakSent(i, btn){
  speak(SENTENCES[i].speak, btn);
  if (!state.doneSents.includes(i)){
    state.doneSents.push(i);
    saveState();
    updateProgress();
  }
}
function slowSent(i, btn){
  const u = new SpeechSynthesisUtterance(SENTENCES[i].speak);
  u.lang='en-US'; u.rate=0.55; u.pitch=1.0;
  try { window.speechSynthesis.cancel(); } catch {}
  btn.classList.add('playing');
  u.onend = () => btn.classList.remove('playing');
  u.onerror = () => btn.classList.remove('playing');
  window.speechSynthesis.speak(u);
}

// ========== 빈칸 ==========
function renderFill(){
  const idx = state.fillIdx % FILLS.length;
  const f = FILLS[idx];
  const html = f.tmpl[0] + '<span class="blank" id="fillBlank">?</span>' + (f.tmpl[1]||'');
  document.getElementById('fillSentence').innerHTML = html;
  document.getElementById('fillKo').textContent = f.ko;
  const opts = [...f.opts].sort(() => Math.random() - 0.5);
  document.getElementById('fillOpts').innerHTML = opts.map(o => {
    const tip = WORD_DICT[o] || '';
    return '<button class="opt-btn word-tip locked" data-tip="'+tip+'" data-word="'+o+'" onclick="checkFill(this,\''+o+'\',\''+f.ans+'\')">'+o+'</button>';
  }).join('');
}
function checkFill(btn, picked, answer){
  // 잠금 해제된 상태(틀린 뒤)에는 클릭 = 소리 재생
  if (!btn.classList.contains('locked')){
    speak(picked);
  }
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  const blank = document.getElementById('fillBlank');
  if (picked === answer){
    btn.classList.add('correct');
    blank.textContent = picked;
    blank.classList.add('filled');
    // 전체 문장 읽어주기
    const idx = state.fillIdx % FILLS.length;
    const full = FILLS[idx].tmpl[0] + answer + (FILLS[idx].tmpl[1]||'');
    setTimeout(() => speak(full.trim().replace(/\s+/g,' ')), 300);
    addSticker();
    setTimeout(() => { state.fillIdx++; saveState(); nextFill(); }, 1500);
  } else {
    btn.classList.add('wrong');
    blank.classList.add('wrong');
    setTimeout(() => {
      btn.classList.remove('wrong');
      blank.classList.remove('wrong');
      // 틀린 뒤에는 모든 옵션 버튼 잠금 해제 → 호버 뜻 표시, 클릭 소리
      document.querySelectorAll('.opt-btn').forEach(b => {
        b.disabled = false;
        b.classList.remove('locked');
        b.classList.add('unlocked-hint');
      });
      setTimeout(() => {
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('unlocked-hint'));
      }, 2400);
    }, 700);
  }
}
function nextFill(){
  renderFill();
  updateProgress();
  if (state.fillIdx >= FILLS.length){
    document.getElementById('doneBanner').classList.add('show');
    document.getElementById('doneCount').textContent = state.stickers;
  }
}

// ========== 공통 ==========
function addSticker(){
  state.stickers++;
  document.getElementById('stickerCount').textContent = state.stickers;
  showPop('⭐','잘했어요!','스티커 '+state.stickers+'개');
  saveState();
}
function showPop(e,t,s){
  document.getElementById('popEmoji').textContent = e;
  document.getElementById('popTitle').textContent = t;
  document.getElementById('popSub').textContent = s;
  document.getElementById('stickerOverlay').classList.add('show');
  setTimeout(closePop, 1300);
}
function closePop(){ document.getElementById('stickerOverlay').classList.remove('show'); }

function updateProgress(){
  const total = WORDS.length + SENTENCES.length + FILLS.length;
  const done = state.doneWords.length + state.doneSents.length + state.fillIdx;
  document.getElementById('progressBar').style.width = Math.min(100, Math.round(done/total*100)) + '%';
}

function resetLesson(){
  if (!confirm('처음부터 다시 할까요? 스티커는 유지돼요.')) return;
  state.doneWords = []; state.doneSents = []; state.fillIdx = 0;
  saveState();
  renderWords(); renderSents(); renderFill(); updateProgress();
  document.getElementById('doneBanner').classList.remove('show');
}

// 초기화
renderWords();
renderSents();
renderFill();
document.getElementById('stickerCount').textContent = state.stickers;
updateProgress();
</script>
</body>
</html>
