<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>영풀 초2 — 알파벳과 첫 단어</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --color-bg:#F0F4F5;
  --color-surface:#D4E0E3;
  --color-primary:#5A7A82;
  --color-muted:#A8B5B8;
  --color-text:#2C3E42;
  --color-text-light:#6B8A90;
  --color-success:#6B8F71;
  --color-warning:#8F856B;
  --color-error:#8F6B6B;
  --touch-min:64px;
  --card-radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Noto Sans KR','Pretendard',sans-serif;
  background:var(--color-bg);
  color:var(--color-text);
  font-size:19px;line-height:1.55;
  -webkit-tap-highlight-color:transparent;
  user-select:none;overflow-x:hidden;
}
.wrap{max-width:480px;margin:0 auto;padding:18px 16px 80px;}
@media(min-width:768px){.wrap{max-width:720px;padding:28px 24px 100px;}}

.app-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 4px 18px;position:sticky;top:0;background:var(--color-bg);z-index:50;}
.back{background:var(--color-surface);border:none;width:48px;height:48px;border-radius:14px;font-size:22px;cursor:pointer;color:var(--color-primary);}
.back:active{transform:scale(0.94);}
.title{font-size:18px;font-weight:700;text-align:center;flex:1;}
.title small{display:block;font-size:11px;color:var(--color-text-light);font-weight:400;margin-top:2px;}
.stickers{display:flex;align-items:center;gap:4px;background:var(--color-surface);padding:6px 10px;border-radius:20px;font-size:13px;font-weight:700;color:var(--color-primary);}

.progress{background:var(--color-surface);height:10px;border-radius:10px;overflow:hidden;margin-bottom:20px;}
.progress .bar{background:var(--color-primary);height:100%;width:0;transition:width .4s ease;}

.section-title{font-size:14px;font-weight:700;color:var(--color-text-light);margin:18px 4px 12px;display:flex;align-items:center;gap:8px;}
.section-title .num{background:var(--color-primary);color:#fff;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;}

/* 알파벳 그리드 */
.abc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
@media(min-width:600px){.abc-grid{grid-template-columns:repeat(6,1fr);}}
.abc-card{
  aspect-ratio:1;
  background:#fff;
  border:2px solid var(--color-surface);
  border-radius:14px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;
  transition:all .15s ease;
  font-weight:800;
  box-shadow:0 2px 6px rgba(90,122,130,0.08);
}
.abc-card:active{transform:scale(0.92);}
.abc-card.done{background:var(--color-surface);border-color:var(--color-primary);}
.abc-card .big{font-size:28px;color:var(--color-primary);}
.abc-card .small{font-size:13px;color:var(--color-text-light);margin-top:-2px;}
.abc-card.done::after{content:'⭐';position:absolute;}

/* 단어 카드 */
.word-card{
  background:#fff;
  border-radius:var(--card-radius);
  padding:22px 18px;
  margin-bottom:14px;
  box-shadow:0 3px 12px rgba(90,122,130,0.1);
  display:flex;align-items:center;gap:16px;
  border:2px solid transparent;
  transition:all .2s ease;
}
.word-card.active{border-color:var(--color-primary);}
.word-card .pic{font-size:52px;flex-shrink:0;width:68px;text-align:center;}
.word-card .text{flex:1;min-width:0;}
.word-card .en{font-size:26px;font-weight:800;color:var(--color-primary);letter-spacing:-0.5px;}
.word-card .ko{font-size:14px;color:var(--color-text-light);margin-top:2px;}
.speak-btn{
  width:56px;height:56px;min-width:56px;
  border:none;border-radius:14px;
  background:var(--color-surface);
  color:var(--color-primary);
  font-size:24px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s ease;
}
.speak-btn:active{transform:scale(0.92);background:var(--color-primary);color:#fff;}
.speak-btn.playing{background:var(--color-primary);color:#fff;animation:pulse 0.8s ease infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}

/* 퀴즈 */
.quiz-card{
  background:#fff;
  border-radius:var(--card-radius);
  padding:24px 20px;
  margin-bottom:20px;
  box-shadow:0 3px 12px rgba(90,122,130,0.1);
  text-align:center;
}
.quiz-card .q-label{font-size:13px;color:var(--color-text-light);margin-bottom:10px;}
.quiz-card .q-word{font-size:42px;font-weight:800;color:var(--color-primary);margin-bottom:8px;display:inline-block;}

/* 단어 호버 팁 (뜻 표시 + 클릭 소리) */
.word-tip{position:relative;cursor:pointer;transition:all .15s ease;}
.word-tip:not(.locked):hover{background:rgba(90,122,130,0.12);border-radius:8px;}
.word-tip:not(.locked)::after{
  content:attr(data-tip);
  position:absolute;
  bottom:calc(100% + 8px);
  left:50%;
  transform:translateX(-50%) scale(0);
  background:var(--color-text);
  color:#fff;
  padding:8px 14px;
  border-radius:10px;
  font-size:14px;
  font-weight:500;
  white-space:nowrap;
  pointer-events:none;
  box-shadow:0 4px 14px rgba(0,0,0,0.25);
  transition:transform .15s ease;
  transform-origin:bottom center;
  z-index:20;
}
.word-tip:not(.locked):hover::after{transform:translateX(-50%) scale(1);}
.word-tip:not(.locked)::before{
  content:'';
  position:absolute;
  bottom:calc(100% + 2px);
  left:50%;
  transform:translateX(-50%) scale(0);
  border:6px solid transparent;
  border-top-color:var(--color-text);
  pointer-events:none;
  transition:transform .15s ease;
  z-index:20;
}
.word-tip:not(.locked):hover::before{transform:translateX(-50%) scale(1);}
.word-tip.locked{cursor:default;}
.word-tip.unlocked-hint{animation:hintPulse 1.2s ease 2;}
@keyframes hintPulse{0%,100%{box-shadow:0 0 0 0 rgba(139,107,107,0);}50%{box-shadow:0 0 0 6px rgba(143,107,107,0.25);}}
.quiz-card .q-speak{margin-bottom:18px;}
.quiz-options{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.quiz-btn{
  background:var(--color-surface);
  border:2px solid transparent;
  border-radius:14px;
  padding:20px 10px;
  font-size:40px;
  cursor:pointer;
  min-height:var(--touch-min);
  transition:all .2s ease;
  font-family:inherit;
}
.quiz-btn:active{transform:scale(0.94);}
.quiz-btn.correct{background:#C4E0C8;border-color:var(--color-success);animation:bounce .5s ease;}
.quiz-btn.wrong{background:#E0C4C4;border-color:var(--color-error);animation:shake .4s ease;}
@keyframes bounce{0%,100%{transform:scale(1);}30%{transform:scale(1.12);}60%{transform:scale(0.95);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

/* 스티커 모달 */
.sticker-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.5);
  align-items:center;justify-content:center;
  z-index:200;
}
.sticker-overlay.show{display:flex;}
.sticker-pop{
  background:#fff;
  border-radius:24px;
  padding:32px 28px;
  text-align:center;
  max-width:300px;
  animation:popIn .45s ease;
}
@keyframes popIn{0%{transform:scale(0.3) rotate(-10deg);opacity:0;}60%{transform:scale(1.1) rotate(5deg);}100%{transform:scale(1) rotate(0);opacity:1;}}
.sticker-pop .big{font-size:90px;margin-bottom:8px;}
.sticker-pop h3{font-size:22px;color:var(--color-primary);margin-bottom:6px;}
.sticker-pop p{font-size:14px;color:var(--color-text-light);margin-bottom:18px;}
.sticker-pop button{
  background:var(--color-primary);color:#fff;
  border:none;border-radius:12px;
  padding:14px 24px;font-size:16px;font-weight:700;
  cursor:pointer;font-family:inherit;
  width:100%;
}

/* 완료 배너 */
.done-banner{
  background:linear-gradient(145deg,#C4E0C8 0%,var(--color-surface) 100%);
  border-radius:var(--card-radius);
  padding:20px;
  text-align:center;
  margin-top:20px;
  display:none;
}
.done-banner.show{display:block;}
.done-banner .big{font-size:48px;margin-bottom:6px;}
.done-banner h3{font-size:18px;color:var(--color-primary);margin-bottom:4px;}
.done-banner p{font-size:13px;color:var(--color-text-light);}

/* 풋 버튼 */
.foot-nav{position:fixed;bottom:0;left:0;right:0;background:var(--color-bg);padding:12px 16px 18px;border-top:1px solid var(--color-surface);display:flex;gap:10px;max-width:720px;margin:0 auto;}
.foot-btn{flex:1;padding:16px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;min-height:var(--touch-min);}
.foot-btn.primary{background:var(--color-primary);color:#fff;}
.foot-btn.ghost{background:var(--color-surface);color:var(--color-primary);}
.foot-btn:active{transform:scale(0.96);}
</style>
</head>
<body>
<div class="wrap">

  <div class="app-bar">
    <button class="back" onclick="location.href='index.html'" aria-label="돌아가기">←</button>
    <div class="title">초등 2학년<small>알파벳과 첫 단어</small></div>
    <div class="stickers">⭐ <span id="stickerCount">0</span></div>
  </div>

  <div class="progress"><div class="bar" id="progressBar"></div></div>

  <!-- 1. 알파벳 -->
  <div class="section-title"><span class="num">1</span> 알파벳을 눌러서 들어봐요</div>
  <div class="abc-grid" id="abcGrid"></div>

  <!-- 2. 첫 단어 -->
  <div class="section-title"><span class="num">2</span> 단어를 듣고 따라 말해요</div>
  <div id="wordList"></div>

  <!-- 3. 퀴즈 -->
  <div class="section-title"><span class="num">3</span> 들은 단어의 그림을 골라요</div>
  <div class="quiz-card" id="quizCard">
    <div class="q-label" id="quizLabel">이 단어는 무엇일까요?</div>
    <div class="q-word word-tip locked" id="quizWord" data-tip="">cat</div>
    <div class="q-speak">
      <button class="speak-btn" onclick="speakQuiz()">🔊</button>
    </div>
    <div class="quiz-options" id="quizOptions"></div>
  </div>

  <div class="done-banner" id="doneBanner">
    <div class="big">🎉</div>
    <h3>오늘 수업 완료!</h3>
    <p>내일도 만나요. 스티커 <span id="doneCount">0</span>개 획득!</p>
  </div>

</div>

<div class="foot-nav">
  <button class="foot-btn ghost" onclick="resetLesson()">🔄 처음부터</button>
  <button class="foot-btn primary" onclick="nextQuiz()">다음 문제 →</button>
</div>

<!-- 스티커 팝업 -->
<div class="sticker-overlay" id="stickerOverlay">
  <div class="sticker-pop">
    <div class="big" id="popEmoji">⭐</div>
    <h3 id="popTitle">잘했어요!</h3>
    <p id="popSub">스티커 1개 획득</p>
    <button onclick="closePop()">계속하기</button>
  </div>
</div>

<script>
// ========== 데이터 ==========
// 초2 수준: 아는 그림과 함께 짝지어진 쉬운 단어
const ALPHABET = [
  {L:'A',l:'a'},{L:'B',l:'b'},{L:'C',l:'c'},{L:'D',l:'d'},
  {L:'E',l:'e'},{L:'F',l:'f'},{L:'G',l:'g'},{L:'H',l:'h'},
  {L:'I',l:'i'},{L:'J',l:'j'},{L:'K',l:'k'},{L:'L',l:'l'},
  {L:'M',l:'m'},{L:'N',l:'n'},{L:'O',l:'o'},{L:'P',l:'p'},
  {L:'Q',l:'q'},{L:'R',l:'r'},{L:'S',l:'s'},{L:'T',l:'t'},
  {L:'U',l:'u'},{L:'V',l:'v'},{L:'W',l:'w'},{L:'X',l:'x'},
  {L:'Y',l:'y'},{L:'Z',l:'z'}
];

const WORDS = [
  {en:'cat',    ko:'고양이',  emoji:'🐱'},
  {en:'dog',    ko:'강아지',  emoji:'🐶'},
  {en:'sun',    ko:'해',      emoji:'☀️'},
  {en:'apple',  ko:'사과',    emoji:'🍎'},
  {en:'book',   ko:'책',      emoji:'📕'},
  {en:'fish',   ko:'물고기',  emoji:'🐟'},
  {en:'milk',   ko:'우유',    emoji:'🥛'},
  {en:'bus',    ko:'버스',    emoji:'🚌'}
];

// ========== 상태 ==========
const STATE_KEY = 'yeon_low_g2_state';
let state = loadState();
function loadState(){
  try {
    return JSON.parse(localStorage.getItem(STATE_KEY)) || { stickers:0, doneAbc:[], quizIdx:0, quizAnswered:[] };
  } catch { return { stickers:0, doneAbc:[], quizIdx:0, quizAnswered:[] }; }
}
function saveState(){ localStorage.setItem(STATE_KEY, JSON.stringify(state)); }

// ========== TTS ==========
let _speaking = false;
function speak(text, btn){
  if (!('speechSynthesis' in window)){ alert('이 기기는 읽어주기를 지원하지 않아요'); return; }
  try { window.speechSynthesis.cancel(); } catch {}
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.8;
  u.pitch = 1.1;
  if (btn){ btn.classList.add('playing'); _speaking = true; }
  u.onend = () => { if (btn) btn.classList.remove('playing'); _speaking = false; };
  u.onerror = () => { if (btn) btn.classList.remove('playing'); _speaking = false; };
  window.speechSynthesis.speak(u);
}

// ========== 알파벳 ==========
function renderAbc(){
  const grid = document.getElementById('abcGrid');
  grid.innerHTML = ALPHABET.map((a,i) => {
    const done = state.doneAbc.includes(a.L) ? 'done' : '';
    return '<button class="abc-card '+done+'" onclick="tapAbc(\''+a.L+'\',this)"><span class="big">'+a.L+'</span><span class="small">'+a.l+'</span></button>';
  }).join('');
}
function tapAbc(L, btn){
  speak(L, btn);
  if (!state.doneAbc.includes(L)){
    state.doneAbc.push(L);
    addSticker();
    saveState();
    btn.classList.add('done');
    updateProgress();
  }
}

// ========== 단어 ==========
function renderWords(){
  const box = document.getElementById('wordList');
  box.innerHTML = WORDS.map((w,i) =>
    '<div class="word-card" id="w'+i+'">' +
      '<div class="pic">'+w.emoji+'</div>' +
      '<div class="text">' +
        '<div class="en">'+w.en+'</div>' +
        '<div class="ko">'+w.ko+'</div>' +
      '</div>' +
      '<button class="speak-btn" onclick="speakWord('+i+',this)">🔊</button>' +
    '</div>'
  ).join('');
}
function speakWord(i, btn){
  const w = WORDS[i];
  document.querySelectorAll('.word-card').forEach(c => c.classList.remove('active'));
  document.getElementById('w'+i).classList.add('active');
  speak(w.en, btn);
}

// ========== 퀴즈 ==========
// 퀴즈 단어의 호버 팁·클릭 소리 잠금 상태
// true  = 문제 풀이 중 (호버/클릭 비활성)
// false = 문제 풀지 않았거나 틀린 후 (호버/클릭 활성)
function setQuizWordLocked(locked){
  const el = document.getElementById('quizWord');
  if (!el) return;
  if (locked){
    el.classList.add('locked');
    el.classList.remove('unlocked-hint');
  } else {
    el.classList.remove('locked');
    el.classList.add('unlocked-hint');
    // 힌트 애니메이션 2.4초 후 제거
    setTimeout(() => el.classList.remove('unlocked-hint'), 2400);
  }
}

function renderQuiz(){
  const idx = state.quizIdx % WORDS.length;
  const correct = WORDS[idx];
  const wordEl = document.getElementById('quizWord');
  wordEl.textContent = correct.en;
  wordEl.dataset.tip = correct.ko;
  // 새 문제 출제 → 호버/클릭 잠금
  setQuizWordLocked(true);
  // 보기 4개 (정답 1 + 오답 3)
  const pool = WORDS.filter((_,i) => i !== idx);
  const wrong = pool.sort(() => Math.random() - 0.5).slice(0, 3);
  const opts = [correct, ...wrong].sort(() => Math.random() - 0.5);
  const box = document.getElementById('quizOptions');
  box.innerHTML = opts.map(o =>
    '<button class="quiz-btn" data-en="'+o.en+'" onclick="checkQuiz(this,\''+o.en+'\',\''+correct.en+'\')">'+o.emoji+'</button>'
  ).join('');
}
function checkQuiz(btn, picked, correct){
  document.querySelectorAll('.quiz-btn').forEach(b => b.disabled = true);
  if (picked === correct){
    btn.classList.add('correct');
    addSticker();
    setTimeout(() => { state.quizIdx++; saveState(); nextQuiz(); }, 900);
  } else {
    btn.classList.add('wrong');
    // 틀린 답 확인 후 → 퀴즈 단어 호버/클릭 활성 (학습 기회)
    setQuizWordLocked(false);
    setTimeout(() => {
      btn.classList.remove('wrong');
      document.querySelectorAll('.quiz-btn').forEach(b => b.disabled = false);
    }, 700);
  }
}

// 퀴즈 단어 클릭 → 소리 (잠금이 풀렸을 때만)
document.addEventListener('DOMContentLoaded', () => {
  const el = document.getElementById('quizWord');
  if (el){
    el.addEventListener('click', () => {
      if (el.classList.contains('locked')) return;
      speak(el.textContent);
    });
  }
});
function speakQuiz(){
  const idx = state.quizIdx % WORDS.length;
  speak(WORDS[idx].en);
}
function nextQuiz(){
  renderQuiz();
  updateProgress();
  if (state.quizIdx >= WORDS.length){
    document.getElementById('doneBanner').classList.add('show');
    document.getElementById('doneCount').textContent = state.stickers;
  }
}

// ========== 스티커 ==========
function addSticker(){
  state.stickers++;
  document.getElementById('stickerCount').textContent = state.stickers;
  showPop('⭐', '잘했어요!', '스티커 '+state.stickers+'개');
  saveState();
}
function showPop(emoji, title, sub){
  document.getElementById('popEmoji').textContent = emoji;
  document.getElementById('popTitle').textContent = title;
  document.getElementById('popSub').textContent = sub;
  document.getElementById('stickerOverlay').classList.add('show');
  setTimeout(closePop, 1400);
}
function closePop(){ document.getElementById('stickerOverlay').classList.remove('show'); }

// ========== 진행률 ==========
function updateProgress(){
  const total = ALPHABET.length + WORDS.length;
  const done = state.doneAbc.length + state.quizIdx;
  const pct = Math.min(100, Math.round((done / total) * 100));
  document.getElementById('progressBar').style.width = pct + '%';
}

// ========== 리셋 ==========
function resetLesson(){
  if (!confirm('처음부터 다시 할까요? 스티커는 유지돼요.')) return;
  state.doneAbc = [];
  state.quizIdx = 0;
  saveState();
  renderAbc();
  renderQuiz();
  updateProgress();
  document.getElementById('doneBanner').classList.remove('show');
}

// ========== 초기화 ==========
renderAbc();
renderWords();
renderQuiz();
document.getElementById('stickerCount').textContent = state.stickers;
updateProgress();
</script>
</body>
</html>
